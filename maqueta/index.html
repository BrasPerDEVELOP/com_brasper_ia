<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cauce · Plataforma de agentes conversacionales (maqueta)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<div class="app">
  <!-- ============ SIDEBAR ============ -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12c4 0 4-6 8-6s4 12 8 12"/></svg></div>
      <div><div class="name">Cauce</div><div class="tag">Conversational AI</div></div>
    </div>
    <div class="tenant-switcher" id="tenantSwitcher">
      <div class="tenant-current" id="tenantCurrent"></div>
      <div class="tenant-menu" id="tenantMenu"></div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="side-foot">
      <div class="usage-mini">
        <h5 data-i18n="usage_title">Consumo del mes</h5>
        <p id="usageText">62.000 / 100.000 mensajes IA</p>
        <div class="bar"><i></i></div>
      </div>
    </div>
    <div class="userrow">
      <div class="av" id="userAv">AC</div>
      <div><div class="un" id="userName">Alberth Castillo</div><div class="ue" id="userRole">Propietario</div></div>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <main class="main">
    <header class="topbar">
      <button class="iconbtn menu-btn" id="menuBtn" aria-label="Menú"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg></button>
      <div class="pt"><span class="k" id="tbTenant">Brasper</span><span class="v" id="pageTitle">Resumen</span></div>
      <div class="search"><span id="searchIcon"></span><input id="searchInput" placeholder="Buscar…"></div>
      <div class="tbtns">
        <span class="demo-pill">MAQUETA DEMO</span>
        <div class="roleswitch" id="roleSwitch"><button class="role-btn" id="roleBtn"></button><div class="role-menu" id="roleMenu"></div></div>
        <div class="langtog" id="langtog">
          <button data-lang="es" class="on">ES</button>
          <button data-lang="pt">PT</button>
          <button data-lang="en">EN</button>
        </div>
        <button class="iconbtn" id="bellBtn"><span class="dot"></span></button>
      </div>
    </header>
    <div class="scroll" id="scroll">
      <div id="views"></div>
    </div>

    <!-- scrim del drawer -->
    <div class="scrim" id="scrim"></div>
    <!-- overlay / modal -->
    <div class="overlay" id="overlay"><div id="modalHost"></div></div>
    <!-- right drawer (bot preview) -->
    <div class="drawer" id="drawer"></div>
    <!-- toasts -->
    <div class="toasts" id="toasts"></div>
  </main>
</div>

<script src="assets/icons.js?v=4"></script>
<script src="assets/i18n.js?v=4"></script>
<script src="assets/data.js?v=4"></script>
<script src="assets/views.js?v=4"></script>
<script src="assets/app.js?v=4"></script>
</body>
</html>
