services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      WHISPER_SERVICE_URL: "http://whisper:8090"
    expose:
      - "8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health')"]
      interval: 20s
      timeout: 5s
      retries: 5

  admin-web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        # Vacío = rutas relativas (mismo origen detrás de Caddy). Sirve igual en
        # local (:8080) y en producción (dominio real). Sin CORS.
        NEXT_PUBLIC_API_BASE: ""
    environment:
      NEXT_PUBLIC_API_BASE: ""
    expose:
      - "3000"
    depends_on:
      api:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "worker.py"]
    env_file:
      - backend/.env
    environment:
      WHISPER_SERVICE_URL: "http://whisper:8090"
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy

  whisper:
    build:
      context: ./backend/whisper_service
    environment:
      WHISPER_MODEL: "small"
      WHISPER_LANGUAGE: "es"
    expose:
      - "8090"
    volumes:
      - whisper-models:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')"]
      interval: 20s
      timeout: 5s
      retries: 10

  reverse-proxy:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      api:
        condition: service_healthy
      admin-web:
        condition: service_started

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    env_file:
      - backend/.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-cauce} -d $${POSTGRES_DB:-cauce}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  redis-data:
  postgres-data:
  whisper-models:
